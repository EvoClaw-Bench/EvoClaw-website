<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvoClaw Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e2e8f0;font-family:'Inter','Segoe UI',system-ui,sans-serif;overflow:hidden}
#canvas{display:block;width:100%;height:100vh}
#tooltip{position:absolute;pointer-events:none;background:rgba(14,14,22,.95);border:1px solid rgba(99,102,241,.4);
  border-radius:10px;padding:14px 18px;font-size:13px;line-height:1.6;max-width:340px;
  display:none;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.5)}
#tooltip h3{font-size:14px;font-weight:700;margin-bottom:6px;color:#a78bfa}
#tooltip p{color:#94a3b8}
#header{position:absolute;top:0;left:0;right:0;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(10,10,20,.9) 0%,transparent 100%);pointer-events:none;z-index:10}
#header h1{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;pointer-events:auto}
#header h1 span{background:linear-gradient(135deg,#6366f1,#a78bfa,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#header .sub{color:#64748b;font-size:.85rem;font-weight:400;margin-left:.5rem}
#legend{position:absolute;bottom:24px;left:32px;display:flex;gap:16px;flex-wrap:wrap;z-index:10}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
.legend-dot{width:10px;height:10px;border-radius:50%}
#controls{position:absolute;bottom:24px;right:32px;font-size:12px;color:#64748b;z-index:10}
</style>
</head>
<body>
<div id="header">
  <h1><span>EvoClaw</span><span class="sub">System Architecture</span></h1>
</div>
<canvas id="canvas"></canvas>
<div id="tooltip"></div>
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div>Data & Preprocessing</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Pipeline Stages</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Evaluation Harness</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Agent Frameworks</div>
  <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Analysis & Output</div>
</div>
<div id="controls">Drag to rotate &middot; Scroll to zoom &middot; Hover for details</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

// ── Scene setup ──
const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a14, 0.012);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 12, 28);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 60;
controls.minDistance = 8;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// ── Lights ──
scene.add(new THREE.AmbientLight(0x4444aa, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);
const pointLight1 = new THREE.PointLight(0x6366f1, 1.5, 40);
pointLight1.position.set(-8, 8, 5);
scene.add(pointLight1);
const pointLight2 = new THREE.PointLight(0xa78bfa, 1, 35);
pointLight2.position.set(8, 6, -5);
scene.add(pointLight2);

// ── Colors ──
const COLORS = {
  data:     0x6366f1,
  pipeline: 0xf59e0b,
  harness:  0x10b981,
  agent:    0xef4444,
  analysis: 0x06b6d4,
};

// ── Architecture Nodes ──
const NODES = [
  // Layer 0: Data Sources (bottom)
  { id: 'github', label: 'GitHub\nRepos', x: -8, y: -6, z: 0, cat: 'data', size: 1.2,
    desc: 'Source code repositories (dubbo, ripgrep, element-web, navidrome, nushell, scikit-learn, go-zero). Cloned locally with full git history.' },
  { id: 'preproc', label: 'Preprocessing', x: -3, y: -6, z: 0, cat: 'data', size: 1.1,
    desc: 'Extracts commit DAGs, patches, main branch commits, symbol tables, and CodeMaat churn analysis from raw repos.' },
  { id: 'procdata', label: 'Processed\nData', x: 3, y: -6, z: 0, cat: 'data', size: 1.0,
    desc: 'main_commits.jsonl, commit_dag.json, patches/, symbol tables, codemaat_analysis.json' },
  { id: 'config', label: 'Config\n& Prompts', x: 8, y: -6, z: 0, cat: 'data', size: 0.9,
    desc: 'YAML stage configs, prompt templates, MCP tool definitions, trial parameters. Controls pipeline behavior.' },

  // Layer 1: Pipeline Stages (middle-low)
  { id: 'stage1', label: 'Stage 1\nSeed Discovery', x: -9, y: -1.5, z: 0, cat: 'pipeline', size: 1.1,
    desc: 'Identifies milestone seed commits from the commit DAG. Seeds mark logical feature/bugfix boundaries in the version range.' },
  { id: 'stage2', label: 'Stage 2\nConsolidation', x: -3, y: -1.5, z: 0, cat: 'pipeline', size: 1.1,
    desc: 'Groups seeds into milestones via subgraph analysis. Uses LLM subagent for seed expansion and semantic grouping. Outputs milestones.csv.' },
  { id: 'stage3', label: 'Stage 3\nDependency\nInference', x: 3, y: -1.5, z: 0, cat: 'pipeline', size: 1.1,
    desc: 'Infers dependency edges between milestones. Validates DAG properties (acyclicity, connectivity). Outputs dependencies.csv.' },
  { id: 'stage4', label: 'Stage 4\nDecompose\n& Balance', x: 9, y: -1.5, z: 0, cat: 'pipeline', size: 1.1,
    desc: 'Balances milestone sizes (splits oversized, merges undersized). Targets CV < 1.0 for uniform distribution. Validates split commits compile.' },

  // Layer 2: Evaluation & Agents (middle-high)
  { id: 'testrunner', label: 'Test\nRunner', x: -6, y: 3.5, z: 0, cat: 'harness', size: 1.1,
    desc: 'Executes tests at milestone states (start/end/original). Two-level result merging with flaky test detection.' },
  { id: 'e2e', label: 'E2E\nOrchestrator', x: 0, y: 3.5, z: 0, cat: 'harness', size: 1.3,
    desc: 'Continuous evaluation pipeline. Watches git tags, dispatches agent tasks, evaluates patches. Calculates fail→pass, pass→pass, none→pass metrics.' },
  { id: 'evaluator', label: 'Patch\nEvaluator', x: 6, y: 3.5, z: 0, cat: 'harness', size: 1.1,
    desc: 'Compares test results before/after agent patches. Computes precision (no regressions), recall (bugs fixed), and resolution status.' },

  // Layer 2.5: Agent Frameworks
  { id: 'claude', label: 'Claude\nCode', x: -7.5, y: 7, z: 2, cat: 'agent', size: 1.2,
    desc: 'Anthropic\'s Claude Code agent. Primary agent with MCP tool integration, session management, and subagent support. Models: Opus 4.5/4.6, Sonnet 4.5/4.6.' },
  { id: 'codex', label: 'Codex\nCLI', x: -2.5, y: 7, z: 2, cat: 'agent', size: 1.1,
    desc: 'OpenAI\'s Codex CLI agent. Models: GPT 5.2, GPT 5.2-Codex, GPT 5.3-Codex.' },
  { id: 'gemini', label: 'Gemini\nCLI', x: 2.5, y: 7, z: 2, cat: 'agent', size: 1.1,
    desc: 'Google\'s Gemini CLI agent. Models: Gemini 3 Pro, Gemini 3 Flash, Gemini 3.1 Pro.' },
  { id: 'openhands', label: 'OpenHands', x: 7.5, y: 7, z: 2, cat: 'agent', size: 1.1,
    desc: 'Open-source agent framework. Supports multiple LLM backends (Opus 4.6, GPT 5.3-Codex, Gemini Flash, Kimi K2.5, MiniMax M2.5).' },

  // Layer 3: Analysis & Output (top)
  { id: 'scoring', label: 'Scoring\nEngine', x: -5, y: 11, z: 0, cat: 'analysis', size: 1.1,
    desc: 'Calculates F1 score (harmonic mean of precision & recall), resolution rate, cost efficiency, and Pareto optimality across all agent-model combinations.' },
  { id: 'database', label: 'SQLite\nDatabase', x: 0, y: 11, z: 0, cat: 'analysis', size: 1.0,
    desc: 'Stores experiments, milestones, dependencies, and evaluation results. Supports views for querying (v_experiments_basic, v_milestone_edges).' },
  { id: 'leaderboard', label: 'EvoClaw\nLeaderboard', x: 5, y: 11, z: 0, cat: 'analysis', size: 1.3,
    desc: 'Interactive web leaderboard at evo-claw.com. Scatter plot (cost vs performance), sortable table, Pareto frontier, dark/light themes.' },
];

// ── Connections ──
const EDGES = [
  // Data flow
  ['github', 'preproc'], ['preproc', 'procdata'], ['config', 'stage1'],
  // Pipeline chain
  ['procdata', 'stage1'], ['stage1', 'stage2'], ['stage2', 'stage3'], ['stage3', 'stage4'],
  // Pipeline to harness
  ['stage4', 'testrunner'], ['stage4', 'e2e'],
  ['testrunner', 'e2e'], ['e2e', 'evaluator'],
  // Agents to E2E
  ['claude', 'e2e'], ['codex', 'e2e'], ['gemini', 'e2e'], ['openhands', 'e2e'],
  // Evaluation to analysis
  ['evaluator', 'scoring'], ['scoring', 'database'], ['scoring', 'leaderboard'],
  ['database', 'leaderboard'],
];

// ── Build 3D objects ──
const nodeObjects = [];
const nodeMeshMap = {};
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

function createNode(node) {
  const group = new THREE.Group();
  group.position.set(node.x, node.y, node.z);
  group.userData = node;

  const color = new THREE.Color(COLORS[node.cat]);

  // Glowing sphere
  const geo = new THREE.SphereGeometry(node.size * 0.6, 32, 32);
  const mat = new THREE.MeshPhysicalMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.3,
    roughness: 0.2,
    metalness: 0.6,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1,
    transparent: true,
    opacity: 0.9,
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);

  // Outer glow ring
  const ringGeo = new THREE.RingGeometry(node.size * 0.75, node.size * 0.85, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -0.1;
  group.add(ring);

  // Label sprite
  const labelCanvas = document.createElement('canvas');
  const ctx = labelCanvas.getContext('2d');
  labelCanvas.width = 256;
  labelCanvas.height = 128;
  ctx.clearRect(0, 0, 256, 128);
  ctx.fillStyle = '#e2e8f0';
  ctx.font = 'bold 22px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const lines = node.label.split('\n');
  const lineHeight = 26;
  const startY = 64 - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach((line, i) => {
    ctx.fillText(line, 128, startY + i * lineHeight);
  });

  const labelTexture = new THREE.CanvasTexture(labelCanvas);
  const labelMat = new THREE.SpriteMaterial({ map: labelTexture, transparent: true, depthTest: false });
  const label = new THREE.Sprite(labelMat);
  label.scale.set(3.2, 1.6, 1);
  label.position.y = -node.size * 0.6 - 1.1;
  group.add(label);

  scene.add(group);
  nodeObjects.push(mesh);
  nodeMeshMap[node.id] = { group, mesh, mat, originalEmissive: 0.3 };
}

NODES.forEach(createNode);

// ── Edges (curved tubes) ──
function createEdge(fromId, toId) {
  const fromNode = NODES.find(n => n.id === fromId);
  const toNode = NODES.find(n => n.id === toId);
  if (!fromNode || !toNode) return;

  const start = new THREE.Vector3(fromNode.x, fromNode.y, fromNode.z);
  const end = new THREE.Vector3(toNode.x, toNode.y, toNode.z);
  const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
  mid.z += 1.5;

  const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
  const points = curve.getPoints(40);
  const geo = new THREE.BufferGeometry().setFromPoints(points);

  const fromColor = new THREE.Color(COLORS[fromNode.cat]);
  const toColor = new THREE.Color(COLORS[toNode.cat]);
  const colors = [];
  points.forEach((_, i) => {
    const t = i / (points.length - 1);
    const c = new THREE.Color().lerpColors(fromColor, toColor, t);
    colors.push(c.r, c.g, c.b);
  });
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

  const mat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.25,
    linewidth: 1,
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  // Animated particle along edge
  const particleGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const particleMat = new THREE.MeshBasicMaterial({
    color: fromColor,
    transparent: true,
    opacity: 0.8,
  });
  const particle = new THREE.Mesh(particleGeo, particleMat);
  scene.add(particle);

  return { curve, particle, fromColor, toColor };
}

const edgeAnimations = EDGES.map(([f, t]) => createEdge(f, t)).filter(Boolean);

// ── Background particles ──
const particleCount = 600;
const particlesGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 60;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 40;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 30 - 5;
  particleSizes[i] = Math.random() * 2 + 0.5;
}
particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particlesGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
const particlesMat = new THREE.PointsMaterial({
  color: 0x6366f1,
  size: 0.08,
  transparent: true,
  opacity: 0.3,
  sizeAttenuation: true,
});
scene.add(new THREE.Points(particlesGeo, particlesMat));

// ── Grid floor ──
const gridHelper = new THREE.GridHelper(40, 40, 0x1c1c2b, 0x111122);
gridHelper.position.y = -8;
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.3;
scene.add(gridHelper);

// ── Layer labels ──
function createLayerLabel(text, y, x) {
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  c.width = 512; c.height = 64;
  ctx.fillStyle = 'rgba(100,116,139,0.6)';
  ctx.font = '600 18px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 36);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(6, 0.8, 1);
  sprite.position.set(x || -14, y, 0);
  scene.add(sprite);
}
createLayerLabel('DATA SOURCES', -6);
createLayerLabel('PIPELINE (LLM-driven)', -1.5);
createLayerLabel('EVALUATION HARNESS', 3.5);
createLayerLabel('AGENT FRAMEWORKS', 7, 14);
createLayerLabel('ANALYSIS & OUTPUT', 11);

// ── Interaction ──
let hoveredNode = null;

canvas.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeObjects);

  // Reset previous hover
  if (hoveredNode) {
    const obj = nodeMeshMap[hoveredNode];
    obj.mat.emissiveIntensity = obj.originalEmissive;
    obj.group.scale.setScalar(1);
  }

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const node = hit.parent.userData;
    hoveredNode = node.id;
    const obj = nodeMeshMap[node.id];
    obj.mat.emissiveIntensity = 0.8;
    obj.group.scale.setScalar(1.15);
    canvas.style.cursor = 'pointer';

    tooltip.style.display = 'block';
    tooltip.innerHTML = `<h3>${node.label.replace(/\n/g, ' ')}</h3><p>${node.desc}</p>`;
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 16) + 'px';

    // Clamp tooltip to viewport
    const rect = tooltip.getBoundingClientRect();
    if (rect.right > window.innerWidth) tooltip.style.left = (e.clientX - rect.width - 16) + 'px';
    if (rect.bottom > window.innerHeight) tooltip.style.top = (e.clientY - rect.height - 16) + 'px';
  } else {
    hoveredNode = null;
    canvas.style.cursor = 'default';
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
  if (hoveredNode) {
    const obj = nodeMeshMap[hoveredNode];
    obj.mat.emissiveIntensity = obj.originalEmissive;
    obj.group.scale.setScalar(1);
    hoveredNode = null;
  }
});

// ── Animation loop ──
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Animate edge particles
  edgeAnimations.forEach((ea, i) => {
    const speed = 0.15 + (i % 5) * 0.03;
    const progress = ((t * speed + i * 0.13) % 1);
    const pos = ea.curve.getPoint(progress);
    ea.particle.position.copy(pos);
    ea.particle.material.opacity = Math.sin(progress * Math.PI) * 0.8;
  });

  // Gentle node floating
  Object.values(nodeMeshMap).forEach((obj, i) => {
    obj.group.position.y = obj.group.userData.y + Math.sin(t * 0.5 + i * 0.7) * 0.15;
  });

  // Pulse ring for hovered node
  if (hoveredNode) {
    const obj = nodeMeshMap[hoveredNode];
    const ring = obj.group.children[1];
    if (ring) ring.material.opacity = 0.15 + Math.sin(t * 3) * 0.1;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
